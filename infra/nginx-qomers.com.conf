server {
    server_name qomers.com www.qomers.com;

    root /var/www/qomers-landing/current;
    index index.html index.htm;

    client_max_body_size 20M;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/_letsencrypt;
        default_type text/plain;
    }

    # HTML: never serve stale. Browser always revalidates via ETag (cheap 304
    # when unchanged), so a deploy reaches returning visitors immediately.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Hashed assets: css/js are referenced with ?v=<commit>, so a new deploy
    # changes the URL. Safe to cache forever.
    location ~* \.(css|js)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Other static assets (favicons, social images, sitemap, robots): revalidate
    # daily. They change rarely and are not hash-busted.
    location ~* \.(png|ico|svg|jpg|jpeg|webp|xml|txt|woff2?)$ {
        add_header Cache-Control "public, max-age=86400";
    }

    location = /site.webmanifest {
        types { application/manifest+json webmanifest; }
        add_header Cache-Control "public, max-age=86400";
    }

    access_log /var/log/nginx/qomers-landing.access.log;
    error_log /var/log/nginx/qomers-landing.error.log;

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/qomers.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/qomers.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = www.qomers.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = qomers.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name qomers.com www.qomers.com;
    return 404; # managed by Certbot




}
